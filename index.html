<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>球衣登記系統</title>

<style>
body { font-family: Arial; max-width: 400px; margin:auto; padding:20px; }
input, select, button { width:100%; padding:10px; margin:8px 0; }
button { background:#4CAF50; color:white; border:none; cursor:pointer; }
h2 { text-align:center; }
#remain { font-weight:bold; margin-bottom:10px; }
</style>

</head>
<body>

<h2>球衣登記</h2>
<p id="remain">載入中...</p>

<form id="form">

<select name="style" required>
  <option value="">選擇款式</option>
  <option value="兩件">兩件</option>
  <option value="紅">紅</option>
  <option value="藍">藍</option>
</select>

<input name="class" placeholder="班級" required>
<input name="name_zh" placeholder="中文姓名" required>

<select id="number" name="number" required>
  <option value="" disabled selected>選擇背號</option>
</select>

<input name="name_en" placeholder="王小明 ➡ X.M.Wang (不用空白)" required>

<select name="top" required>
  <option value="">上衣尺寸</option>
  <option>3XS</option><option>2XS</option><option>XS</option>
  <option>S</option><option>M</option><option>L</option>
  <option>XL</option><option>2XL</option><option>3XL</option><option>4XL</option>
</select>

<select name="pants" required>
  <option value="">褲子尺寸</option>
  <option>3XS</option><option>2XS</option><option>XS</option>
  <option>S</option><option>M</option><option>L</option>
  <option>XL</option><option>2XL</option><option>3XL</option><option>4XL</option>
</select>

<button type="submit">送出</button>
</form>

<script>
const API = "https://script.google.com/macros/s/AKfycbxztSjJDYurb65ZZA44bmAVXO2CnhtWzRvvwBjqHLDSqgEI-5p-4kX1LQkFHu0HKzMr2g/exec";

async function loadNumbers(){
  try {
    let res = await fetch(API);
    let available = await res.json();

    let select = document.getElementById("number");
    select.innerHTML = '<option value="" disabled selected>選擇背號</option>';

    available.forEach(n=>{
      let opt = document.createElement("option");
      opt.value = n;
      opt.text = n;
      select.appendChild(opt);
    });

    document.getElementById("remain").innerText =
      `可選背號：${available.join(", ")}`;

  } catch(e){
    document.getElementById("remain").innerText = "⚠ 無法讀取背號";
  }
}

loadNumbers();

document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  let data = Object.fromEntries(new FormData(this));

  let res = await fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  });

  let text = await res.text();

  if(text === "duplicate"){
    alert("❌ 背號已被選走！");
  } else {
    alert("✅ 成功！");
    this.reset();
  }

  loadNumbers();
});
</script>

</body>
</html>
